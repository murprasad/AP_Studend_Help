[build]
  command = "npx prisma generate && npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Increase timeout for API routes that call LLMs (26s = free tier max)
[functions."api/practice"]
  timeout = 26

[functions."api/ai/*"]
  timeout = 26

[functions."api/chat/*"]
  timeout = 26

[[plugins]]
  package = "@netlify/plugin-nextjs"
