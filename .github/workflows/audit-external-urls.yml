name: External URL audit

# 2026-06-02 — Nightly link-rot check per Quality Process v1 G6 SRE gate.
# Would have caught the Khan Academy /test-prep/mcat/* deprecation that
# served Jimmy Sabbatical a broken theories-of-deviance page on PL.
# Email on failure goes to contact@studentnest.ai.

on:
  schedule:
    - cron: "0 8 * * 1,3,5"  # Mon/Wed/Fri 08:00 UTC
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - run: node scripts/_audit-external-urls.mjs --source=all --report
      - name: Commit audit report if generated
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d data/external-url-audits ]; then
            git add data/external-url-audits/
            git diff --cached --quiet || git commit -m "audit(external-urls): $(date -I) nightly report"
            git push || true
          fi
      - name: Email on broken URLs
        if: failure()
        run: |
          echo "Broken external URLs detected — see workflow run." >&2
          # Email integration TBD — for now the failure email goes via the
          # default GitHub Actions notification to the repo's notification
          # settings. Wire up Resend/SendGrid here once SMTP creds are in
          # repo secrets.
