name: Quality Sweep (daily)

on:
  schedule:
    # Daily at 09:00 UTC (4 AM ET) — off-peak so DB updates don't conflict
    # with student traffic. Note: GitHub schedule has up to 1h drift.
    - cron: "0 9 * * *"
  workflow_dispatch: # manual trigger

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Generate Prisma
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Run quality sweep (all gates, --apply)
        run: npm run quality:sweep
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Notify on failure
        if: failure()
        run: echo "::warning::Quality sweep failed — investigate scripts/_quality-sweep-all.mjs output"
