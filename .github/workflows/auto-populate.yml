name: Auto-Populate Question Bank

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger from GitHub Actions UI

jobs:
  auto-populate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-populate
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            https://studentnest.ai/api/cron/auto-populate \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP Status: $status"
          echo "Response: $body"
          if [ "$status" = "401" ]; then
            echo "❌ 401 Unauthorized — check that CRON_SECRET in GitHub Actions matches the one in Cloudflare Pages."
            exit 1
          fi
          if [ "$status" = "200" ]; then
            echo "✅ Success"
            exit 0
          fi
          echo "❌ Unexpected status $status"
          exit 1
