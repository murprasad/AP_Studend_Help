name: Auto-Populate Question Bank

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger from GitHub Actions UI

jobs:
  auto-populate:
    runs-on: ubuntu-latest
    steps:
      - name: Check CRON_SECRET is configured
        if: ${{ secrets.CRON_SECRET == '' }}
        run: |
          echo "⚠️  CRON_SECRET is not set in GitHub Actions secrets."
          echo "    Go to: Settings → Secrets and variables → Actions → New repository secret"
          echo "    Name: CRON_SECRET  Value: (same value as CRON_SECRET in Cloudflare Pages)"
          exit 1

      - name: Trigger auto-populate
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            https://studentnest.ai/api/cron/auto-populate \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP Status: $status"
          echo "Response: $body"
          if [ "$status" = "401" ]; then
            echo "❌ 401 Unauthorized — CRON_SECRET in GitHub does not match the one set in Cloudflare Pages."
            exit 1
          fi
          if [ "$status" = "200" ]; then
            echo "✅ Success"
            exit 0
          fi
          echo "❌ Unexpected status $status"
          exit 1
