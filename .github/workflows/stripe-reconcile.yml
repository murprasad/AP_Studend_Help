name: Hourly Stripe Reconcile

on:
  schedule:
    # Every hour at :00. Catches webhook failures within ~60 min.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  stripe-reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/stripe-reconcile
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            https://studentnest.ai/api/cron/stripe-reconcile \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 90)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "Status: $status"
          echo "Body: $body"

          # 401 = secret mismatch. Don't fail-loud (causes GH email noise);
          # log a warning and exit 0. Once CRON_SECRET is rotated in both
          # GitHub Actions and Cloudflare Pages secrets, this branch goes
          # away and the reconcile resumes automatically.
          if [ "$status" = "401" ]; then
            echo "::warning::CRON_SECRET mismatch — skipping reconcile until GH Actions + CF secrets are re-synced."
            exit 0
          fi
          if [ "$status" != "200" ]; then
            echo "❌ Status $status"; exit 1
          fi

          checked=$(echo "$body" | grep -o '"checked":[0-9]*' | grep -o '[0-9]*' || echo 0)
          reconciled=$(echo "$body" | grep -o '"reconciled":[0-9]*' | grep -o '[0-9]*' || echo 0)
          echo "## Stripe reconcile" >> $GITHUB_STEP_SUMMARY
          echo "- Checked: $checked active Stripe subs" >> $GITHUB_STEP_SUMMARY
          echo "- Reconciled (FREE → PREMIUM): $reconciled" >> $GITHUB_STEP_SUMMARY
          if [ "$reconciled" != "0" ]; then
            echo "- ⚠️  Email sent to contact@studentnest.ai" >> $GITHUB_STEP_SUMMARY
          fi
