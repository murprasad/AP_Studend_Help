name: Seed Question Bank

# Runs every 6 hours to fill empty course units.
# Also available as manual trigger for immediate seeding.
# Stops early when all units have ≥ 8 questions.
on:
  schedule:
    - cron: '0 * * * *'   # every hour until all courses are seeded
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of batches to run (default 120, each adds up to 8 questions)'
        required: false
        default: '120'
      questions_per_batch:
        description: 'Questions per batch (max 10, keep ≤ 8 to avoid CF timeout)'
        required: false
        default: '8'

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Seed question bank
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          ITERATIONS=${{ github.event.inputs.iterations || 120 }}
          QPB=${{ github.event.inputs.questions_per_batch || 8 }}
          success=0
          failed=0
          total_generated=0
          consecutive_empty=0

          echo "Starting seed: $ITERATIONS iterations × $QPB questions each"
          echo "Target: fill all empty CLEP/AP/SAT/ACT course units"

          for i in $(seq 1 $ITERATIONS); do
            response=$(curl -s -w "\n%{http_code}" -X POST \
              "https://studentnest.ai/api/cron/auto-populate?limit=${QPB}" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              --max-time 90)
            body=$(echo "$response" | head -n -1)
            status=$(echo "$response" | tail -n 1)

            if [ "$status" = "401" ]; then
              echo "❌ 401 Unauthorized — CRON_SECRET mismatch. Stopping."
              exit 1
            fi

            if [ "$status" = "200" ]; then
              generated=$(echo "$body" | grep -o '"generated":[0-9]*' | grep -o '[0-9]*' || echo 0)
              total_generated=$((total_generated + generated))
              success=$((success + 1))
              echo "[$i/$ITERATIONS] ✅ +${generated} questions (total: $total_generated)"

              if [ "$generated" = "0" ]; then
                consecutive_empty=$((consecutive_empty + 1))
              else
                consecutive_empty=0
              fi
            else
              failed=$((failed + 1))
              consecutive_empty=0
              echo "[$i/$ITERATIONS] ⚠️  status $status"
            fi

            # Stop early if bank is fully seeded (3 consecutive empty results)
            processed=$(echo "$body" | grep -o '"processed":[0-9]*' | grep -o '[0-9]*' || echo 1)
            if [ "$processed" = "0" ] && [ "$status" = "200" ]; then
              echo "🎉 All units are fully seeded — stopping early at iteration $i"
              break
            fi

            if [ "$consecutive_empty" -ge 3 ]; then
              echo "🎉 3 consecutive empty batches — bank appears full. Stopping."
              break
            fi

            # Rate limit delay
            sleep 8
          done

          echo ""
          echo "═══ Seeding complete ═══"
          echo "Successful batches : $success"
          echo "Failed batches     : $failed"
          echo "Total questions    : $total_generated"

          if [ "$success" -gt 0 ] || [ "$consecutive_empty" -ge 3 ]; then
            exit 0
          else
            exit 1
          fi
