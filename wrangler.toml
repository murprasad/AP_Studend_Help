# ─── Stripe Payment Secrets ───────────────────────────────────────────────────
# Set these via the Cloudflare Pages dashboard or with:
#   wrangler pages secret put STRIPE_SECRET_KEY       --project-name=studentnest
#   wrangler pages secret put STRIPE_WEBHOOK_SECRET   --project-name=studentnest
#   wrangler pages secret put STRIPE_PREMIUM_PRICE_ID --project-name=studentnest
#   wrangler pages secret put STRIPE_ANNUAL_PRICE_ID  --project-name=studentnest
#
# STRIPE_SECRET_KEY         = "sk_live_..."   ← CF Pages Secret (not here)
# STRIPE_WEBHOOK_SECRET     = "whsec_..."     ← CF Pages Secret (not here)
# STRIPE_PREMIUM_PRICE_ID   = "price_..."     ← CF Pages Secret (not here)  (monthly $9.99)
# STRIPE_ANNUAL_PRICE_ID    = "price_..."     ← CF Pages Secret (not here)  (annual  $79.99)
# ─────────────────────────────────────────────────────────────────────────────

# ─── Native Cloudflare rate-limit bindings (SEC-2b, 2026-04-25) ──────────────
# Workers Rate Limiting API (free, edge-distributed). NOTE: wrangler 4.72.0
# rejects [[unsafe.bindings]] for Pages projects ("Configuration file for
# Pages projects does not support 'unsafe'"). Configure ratelimit bindings
# via the Cloudflare Pages dashboard instead (Settings → Functions →
# Bindings → Add binding → Rate limiting). The four namespaces:
#   RATELIMIT_5  → namespace 1005, limit 5/60s
#   RATELIMIT_10 → namespace 1010, limit 10/60s
#   RATELIMIT_20 → namespace 1020, limit 20/60s
#   RATELIMIT_60 → namespace 1060, limit 60/60s
# Until the dashboard bindings are added, src/lib/rate-limit.ts falls back
# to its in-process Map limiter (best-effort).
# ─────────────────────────────────────────────────────────────────────────────
