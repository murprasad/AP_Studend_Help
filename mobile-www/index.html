<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>StudentNest</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #1865F2; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; padding: env(safe-area-inset-top, 0) 24px env(safe-area-inset-bottom, 0); }
      .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { margin: 0; font-size: 24px; font-weight: 700; }
      p { margin: 0; opacity: 0.85; font-size: 14px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <h1>StudentNest</h1>
      <p>Connecting…</p>
    </div>
  </body>
</html>
